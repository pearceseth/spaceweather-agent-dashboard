# Development Docker Compose override
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# This override:
# - Mounts source volumes for hot reload
# - Uses development environment
# - Runs services with dev commands instead of production builds

services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: builder
    command: ["pnpm", "--filter", "@space-weather/api", "dev"]
    environment:
      - NODE_ENV=development
      - PORT=3001
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      # Mount source for hot reload
      - ./packages/types/src:/app/packages/types/src:ro
      - ./packages/agent/src:/app/packages/agent/src:ro
      - ./packages/api/src:/app/packages/api/src:ro
      # Mount config files
      - ./tsconfig.base.json:/app/tsconfig.base.json:ro
      - ./packages/types/tsconfig.json:/app/packages/types/tsconfig.json:ro
      - ./packages/agent/tsconfig.json:/app/packages/agent/tsconfig.json:ro
      - ./packages/api/tsconfig.json:/app/packages/api/tsconfig.json:ro
    # Disable healthcheck for faster dev startup
    healthcheck:
      disable: true
    restart: "no"

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      target: builder
    command: ["pnpm", "--filter", "@space-weather/web", "dev"]
    environment:
      - NODE_ENV=development
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=http://api:3001
    volumes:
      # Mount source for hot reload
      - ./packages/types/src:/app/packages/types/src:ro
      - ./packages/web/src:/app/packages/web/src:ro
      # Mount config files
      - ./tsconfig.base.json:/app/tsconfig.base.json:ro
      - ./packages/types/tsconfig.json:/app/packages/types/tsconfig.json:ro
      - ./packages/web/tsconfig.json:/app/packages/web/tsconfig.json:ro
      - ./packages/web/next.config.mjs:/app/packages/web/next.config.mjs:ro
      - ./packages/web/tailwind.config.ts:/app/packages/web/tailwind.config.ts:ro
      - ./packages/web/postcss.config.cjs:/app/packages/web/postcss.config.cjs:ro
    depends_on:
      - api
    # Disable healthcheck for faster dev startup
    healthcheck:
      disable: true
    restart: "no"
